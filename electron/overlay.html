<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1f2937;
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #input {
      width: 460px; padding: 12px 16px;
      font-size: 16px; color: #f9fafb;
      background: #374151; border: 1px solid #4b5563;
      border-radius: 8px; outline: none;
    }
    #input:focus { border-color: #60a5fa; }
    #input::placeholder { color: #9ca3af; }
    .success { color: #34d399; font-size: 24px; display: none; }
  </style>
</head>
<body>
  <input id="input" type="text" placeholder="Quick capture..." autofocus />
  <span class="success" id="check">✓</span>
  <script>
    const input = document.getElementById('input');
    const check = document.getElementById('check');

    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        try {
          await fetch('http://localhost:3001/api/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: input.value.trim() })
          });
          input.style.display = 'none';
          check.style.display = 'block';
          setTimeout(() => window.electronAPI?.hideOverlay(), 500);
        } catch (err) {
          input.style.borderColor = '#ef4444';
        }
      }
      if (e.key === 'Escape') {
        window.electronAPI?.hideOverlay();
      }
    });
  </script>
</body>
</html>
