<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; padding: 12px; background: #1f2937; color: #f9fafb; font-family: system-ui; }
    input, textarea { width: 100%; background: #374151; border: 1px solid #4b5563; color: #f9fafb;
                      padding: 6px 8px; border-radius: 4px; margin-bottom: 8px; box-sizing: border-box; }
    input { font-size: 13px; }
    textarea { height: 60px; resize: none; font-size: 13px; }
    button { width: 100%; background: #3b82f6; color: white; border: none; padding: 8px;
             border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2563eb; }
    button:disabled { background: #4b5563; cursor: not-allowed; }
    #status { margin-top: 8px; font-size: 12px; text-align: center; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    label { font-size: 11px; color: #9ca3af; margin-bottom: 2px; display: block; }
  </style>
</head>
<body>
  <label>URL</label>
  <input type="text" id="url" readonly>
  <label>Title</label>
  <input type="text" id="title" placeholder="Page title">
  <label>Note (optional)</label>
  <textarea id="note" placeholder="Add a note..."></textarea>
  <button id="clipBtn">Clip to Cortex Inbox</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
